version: "3.0"

services:
  # database service
  mysql:
    image: mariadb:latest
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - my-network
  # wordpress
  wp:
    env_file:
      - .env
    environment:
      WP_SITEURL: ${WP_HOME}/wp
    build:
      dockerfile: docker/wp.local.Dockerfile
      context: "."
    # mounting local volume for hot-reload
    volumes:
      - ./site:/site # Mounting Sourcecode
      - /var/cache/composer # Composer Cache [See Anonymous Volumes]
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - my-network
  # theme
  theme:
    build:
      dockerfile: docker/theme.local.Dockerfile
      context: "."
    volumes:
      - ./theme:/theme
      - /theme/node_modules
      - /var/cache/yarn
    depends_on:
      - wp
    restart: 'no'
    ports:
      - "3000:3000"
      - "3001:3001"
    networks:
      - my-network
networks:
  my-network:
volumes:
  db_data:
